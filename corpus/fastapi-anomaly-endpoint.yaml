id: fastapi-anomaly-endpoint
goal: |
  Build a small FastAPI service exposing `GET /anomalies`.

  Requirements:
  1. Create `src/api.py` with a FastAPI `app` and a `GET /anomalies`
     route that returns a list of `Anomaly` objects.
  2. `Anomaly` is a `pydantic.BaseModel` with fields:
     id (int), score (float, 0.0-1.0), detected_at (datetime).
  3. The endpoint returns at least one seeded example so the response
     is never empty.
  4. Create `tests/test_api.py` using FastAPI's TestClient that calls
     `GET /anomalies` and asserts status 200 AND a non-empty list with
     the expected fields on each item.
  5. The test must pass under `python -m pytest tests/`.

  Work in the current directory. Do not install packages (assume
  fastapi, pydantic, pytest, and httpx are available).
timeout_s: 300
setup:
  files:
    README.md: |
      # Anomaly API — gym task fixture
      The agent must build src/api.py + tests/test_api.py per the goal.
    pyproject.toml: |
      [build-system]
      requires = ["setuptools>=61"]
      build-backend = "setuptools.build_meta"

      [project]
      name = "gym-anomaly-api"
      version = "0.0.1"
      requires-python = ">=3.11"

      [tool.pytest.ini_options]
      pythonpath = ["."]
assertions:
  # Structural — files exist somewhere under the worktree. Path-tolerant
  # so an agent that wraps work in a subdirectory isn't penalised for
  # the directory choice, only for the content.
  - type: file_exists_anywhere
    glob: "**/api.py"
  - type: file_exists_anywhere
    glob: "**/test_api.py"

  # FastAPI + pydantic basics.
  - type: file_contains_anywhere
    glob: "**/api.py"
    pattern: "from fastapi import"
  - type: file_contains_anywhere
    glob: "**/api.py"
    pattern: "class Anomaly"
  - type: file_contains_anywhere
    glob: "**/api.py"
    pattern: "@app\\.get.*anomalies"

  # Idiomatic pydantic: constrained score field. Rewards
  # agents that use Field(ge=, le=) or similar validators over a bare
  # `score: float`.
  - type: file_contains_anywhere
    glob: "**/api.py"
    pattern: "Field\\(.*(ge|le|gt|lt)"

  # Idiomatic FastAPI: typed response via response_model or a list[Model]
  # return annotation on the route. Either form counts.
  - type: file_contains_anywhere
    glob: "**/api.py"
    pattern: "(response_model\\s*=|->\\s*(list\\[|List\\[))"

  # Tests use TestClient (not ad-hoc ASGI poking).
  - type: file_contains_anywhere
    glob: "**/test_api.py"
    pattern: "TestClient"

  # At least two test functions — 2× `def test_` anywhere in the file,
  # non-greedy to allow arbitrary body length between them. Set to 2
  # because empirically both agents write 2 — bumping to 3 would punish
  # for a behaviour neither agent reliably exhibits, and we want the
  # assertion to discriminate not just punish.
  - type: file_contains_anywhere
    glob: "**/test_api.py"
    pattern: "def test_[\\s\\S]*?def test_"

  # Tests pass. Glob on test_api.py so the pytest run happens in
  # whichever project directory actually contains the generated tests
  # (could be the workdir, could be a subdirectory the agent created).
  - type: command_anywhere
    glob: "**/test_api.py"
    cmd: ["python", "-m", "pytest", "-q", "--rootdir", "."]
    expect_exit: 0
